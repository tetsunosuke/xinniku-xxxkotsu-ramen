<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>写真</title>
  <link rel="stylesheet" href="../assets/css/apps-common.css">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --border: #222230;
      --text: #dddde8;
      --muted: #6a6a80;
      --muted: #6a6a80;
    }
    body { background:var(--bg); color:var(--text); }

    /* ── Header ── */
    #gallery-header {
      background:rgba(10,10,18,0.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; position:sticky; top:0; z-index:10;
    }
    .gh-title { font-size:18px; font-weight:700; }
    .gh-sub { font-size:12px; color:var(--muted); }

    /* ── Albums / Grid ── */
    #gallery-body { flex:1; overflow-y:auto; padding-bottom:65px; }

    .album-section { margin-bottom:4px; }
    .album-header {
      padding:14px 16px 8px;
      font-size:13px; font-weight:600; color:var(--muted);
      letter-spacing:1px; text-transform:uppercase;
    }
    .photo-grid {
      display:grid; grid-template-columns:repeat(3, 1fr); gap:2px;
    }
    .photo-cell {
      aspect-ratio:1; overflow:hidden; position:relative;
      background:var(--bg2); cursor:pointer;
      transition:opacity 0.15s;
    }
    .photo-cell:hover { opacity:0.85; }
    .photo-cell img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-cell .ph-label {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      font-size:10px; color:rgba(255,255,255,0.7); padding:6px 6px 4px;
    }
    .photo-placeholder {
      width:100%; height:100%; display:flex;
      align-items:center; justify-content:center;
      font-size:32px; color:#222;
      flex-direction:column; gap:6px;
    }
    .photo-placeholder span { font-size:10px; color:#333; }

    /* Kitchen photo special */
    .photo-cell.kitchen-cell {
      border:2px solid rgba(180,50,50,0.3);
    }
    .photo-cell.kitchen-cell::after {
      content:'NEW'; position:absolute; top:6px; right:6px;
      background:rgba(220,50,50,0.9);
      color:white; font-size:9px; font-weight:700;
      padding:2px 5px; border-radius:3px;
    }

    /* ── Lightbox ── */
    #lightbox {
      position:fixed; inset:0; z-index:100;
      background:#000;
      display:none; flex-direction:column;
      animation:lbIn 0.25s ease;
    }
    #lightbox.open { display:flex; }
    @keyframes lbIn { from { opacity:0; } to { opacity:1; } }

    #lb-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px;
      background:rgba(0,0,0,0.8); flex-shrink:0;
    }
    #lb-close {
      font-size:22px; cursor:pointer; color:rgba(255,255,255,0.7);
      padding:4px 10px; border-radius:6px; background:none; border:none;
      transition:color 0.15s;
    }
    #lb-close:hover { color:white; }
    #lb-filename { font-size:13px; color:rgba(255,255,255,0.6); }
    #lb-date { font-size:12px; color:rgba(255,255,255,0.4); }

    #lb-image-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    #lb-img {
      max-width:100%; max-height:100%; object-fit:contain; display:block;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #lb-img.zoomed {
      transform: scale(1.3) translateY(-10px);
    }

    }
  </style>
</head>
<body>

<div id="gallery-header" style="display:flex; align-items:center; gap:12px;">
  <span class="gallery-back-btn" onclick="goBackHome()">←</span>
  <div>
    <div class="gh-title">写真</div>
    <div class="gh-sub" id="photo-count">読み込み中...</div>
  </div>
</div>

<div id="gallery-body">
  <div class="album-section">
    <div class="album-header">最近の項目</div>
    <div class="photo-grid" id="photo-grid"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-header">
    <button id="lb-close" onclick="closeLightbox()" aria-label="閉じる">✕</button>
    <div>
      <div id="lb-filename">---</div>
      <div id="lb-date">---</div>
    </div>
  </div>
  <div id="lb-image-wrap">
    <img id="lb-img" src="" alt="写真">
  </div>
  
  <!-- 調査エリア -->
  <div id="lb-inspect-area" style="display:none; flex-direction:column; align-items:center; padding:16px; background:rgba(10,10,18,0.95); border-top:1px solid var(--border); gap:12px; z-index:10; box-sizing:border-box; width:100%;">
    <button id="lb-inspect-btn" onclick="inspectPhoto()" style="padding:10px 20px; background:#1d9bf0; color:#fff; border:none; border-radius:20px; font-size:13px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:6px; transition:transform 0.1s, background-color 0.2s;">
      <span>🔍 写真を調査する</span>
    </button>
    <div id="lb-inspection-text" style="font-size:12px; line-height:1.6; color:#a0a0c0; text-align:left; width:100%; display:none; max-width:480px; background:rgba(0,0,0,0.4); padding:10px 14px; border-radius:8px; border-left:3.5px solid #1d9bf0; box-sizing:border-box;">
      <!-- 調査メッセージが入る -->
    </div>
  </div>
</div>

<script src="../assets/js/app-utils.js"></script>
<script>
  if (window.self === window.top) {
    const isExtra = window.location.pathname.includes('extra');
    window.location.href = isExtra ? '/extra' : '/';
  }

  const PHOTOS = [
    { id:'mirror',  file:'../assets/images/mirror_case.png', label:'IMG_0848', date:'2024年11月12日', mirrorSpecial:true,
      inspectionText: '鏡に映したスマホの背面を撮影した写真だ。左右反転したことで、限定ケースの刻印の文字が正しく読めるようになっている！\nそこには「〇ンニク〇んこつラーメン since 2019.08.26 / 台東区音無町3-19-3」と書かれている。\n厨房の写真から推測した「3-19-4」と、この刻印に書かれている「3-19-3」は住所の枝番が違っている。太郎が囚われている真の場所は、こちらの住所なのだろうか？' },
    { id:'kitchen', file:'../assets/images/kitchen.png', label:'IMG_0847', date:'2024年11月12日', special:true,
      inspectionText: 'ここが噂の店の厨房なのだろう。人の名前が書かれた袋がある。配達するような内容には見えていないが、この袋の中身は一体。' },
    { id:'case',    file:'../assets/images/case.png',    label:'IMG_0830', date:'2024年11月12日', caseSpecial:true,
      inspectionText: '拾ったスマホのケースと同じ、ラーメン店のオープン記念品の写真だ。背面の刻印には「〇ンニク〇んこつラーメン since 2019.08.26」とある。太郎がSNSで言っていた「最強のパスコードルール」、お気に入りのお店のオープン日（08/26）はここから来ていたんだな。' },
    { id:'store',   file:'../assets/images/store.png',   label:'IMG_0831', date:'2024年11月12日' },
    { id:'ramen1',  file:'../assets/images/ramen.png',   label:'IMG_0820', date:'2024年11月1日'  },
    { id:'selfie1', file:'../assets/images/selfie.png',  label:'IMG_0790', date:'2024年10月18日' },
    { id:'ramen2',  file:null, label:'IMG_0804', date:'2024年10月25日', emoji:'🍱' },
    { id:'map',     file:null, label:'IMG_0765', date:'2024年10月3日',  emoji:'🗺️' },
  ];

  let currentPhotoId = null;
  let gameState = null;

  // Get state from parent
  window.parent.postMessage({ type: 'GET_STATE' }, '*');
  window.addEventListener('message', e => {
    if (e.data?.type === 'STATE') {
      gameState = e.data.state;
      // グリッドを再描画
      buildGrid();
      // 既にLightboxが開いている場合、調査ボタンなどの状態をリフレッシュする
      if (currentPhotoId) {
        refreshInspectionArea();
      }
    }
  });

  function buildGrid() {
    const grid = document.getElementById('photo-grid');
    const count = document.getElementById('photo-count');
    grid.innerHTML = '';

    const visiblePhotos = PHOTOS.filter(p => {
      if (p.id === 'mirror') {
        return gameState && gameState.flags?.pickedMirrorPhotoTaken;
      }
      return true;
    });

    count.textContent = visiblePhotos.length + '枚の写真';
    visiblePhotos.forEach(p => {
      const cell = document.createElement('div');
      cell.className = 'photo-cell' + (p.special || p.caseSpecial || p.mirrorSpecial ? ' kitchen-cell' : '');
      cell.onclick = () => openPhoto(p.id);
      if (p.file) {
        const img = document.createElement('img');
        img.src = p.file; img.alt = p.label;
        img.onerror = () => {
          cell.innerHTML = `<div class="photo-placeholder"><span style="font-size:28px">📷</span><span>${p.label}</span></div>`;
        };
        cell.appendChild(img);
        if (p.special || p.caseSpecial) {
          const lbl = document.createElement('div');
          lbl.className = 'ph-label'; lbl.textContent = p.label;
          cell.appendChild(lbl);
        }
      } else {
        cell.innerHTML = `<div class="photo-placeholder"><span>${p.emoji||'📷'}</span><span>${p.label}</span></div>`;
      }
      grid.appendChild(cell);
    });
  }

  function openPhoto(id) {
    const p = PHOTOS.find(x => x.id === id);
    if (!p) return;
    currentPhotoId = id;
    document.getElementById('lb-filename').textContent = p.label;
    document.getElementById('lb-date').textContent = p.date;
    const img = document.getElementById('lb-img');
    img.classList.remove('zoomed');
    
    if (p.file) {
      img.src = p.file;
      img.style.display = 'block';
    } else {
      img.src = '';
      img.style.display = 'none';
    }
    
    refreshInspectionArea();
    document.getElementById('lightbox').classList.add('open');
  }

  function refreshInspectionArea() {
    const p = PHOTOS.find(x => x.id === currentPhotoId);
    if (!p) return;
    
    const area = document.getElementById('lb-inspect-area');
    const btn = document.getElementById('lb-inspect-btn');
    const txt = document.getElementById('lb-inspection-text');
    const img = document.getElementById('lb-img');

    if (p.special || p.caseSpecial || p.mirrorSpecial) {
      area.style.display = 'flex';
      
      const isInspected = gameState && (
        (p.special && gameState.flags?.kitchenPhotoViewed) ||
        (p.caseSpecial && gameState.flags?.casePhotoViewed) ||
        (p.mirrorSpecial && gameState.flags?.trueAddressFound)
      );

      if (isInspected) {
        btn.style.display = 'none';
        txt.textContent = p.inspectionText;
        txt.style.display = 'block';
        img.classList.add('zoomed');
      } else {
        btn.style.display = 'flex';
        txt.style.display = 'none';
        img.classList.remove('zoomed');
      }
    } else {
      area.style.display = 'none';
    }
  }

  function inspectPhoto() {
    const p = PHOTOS.find(x => x.id === currentPhotoId);
    if (!p) return;
    
    const btn = document.getElementById('lb-inspect-btn');
    const txt = document.getElementById('lb-inspection-text');
    const img = document.getElementById('lb-img');

    btn.style.display = 'none';
    txt.textContent = p.inspectionText;
    txt.style.display = 'block';
    img.classList.add('zoomed');

    // 親へフラグを送信
    if (p.special) {
      post('SET_FLAG', { key: 'kitchenPhotoViewed', value: true });
    }
    if (p.caseSpecial) {
      post('SET_FLAG', { key: 'casePhotoViewed', value: true });
    }
    if (p.mirrorSpecial) {
      post('SET_FLAG', { key: 'trueAddressFound', value: true });
    }
    
    post('TRACK_EVENT', { eventName: 'inspect_photo', params: { photo_id: p.id } });
    
    // 再度最新の状態を要求
    post('GET_STATE');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    const img = document.getElementById('lb-img');
    img.classList.remove('zoomed');
    currentPhotoId = null;
  }

  function goBackHome() {
    post('CLOSE_APP', { appId: 'gallery' });
  }

  buildGrid();
</script>
</body>
</html>
