<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写真</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --border: #222230;
      --text: #dddde8;
      --muted: #6a6a80;
      --font: 'Noto Sans JP', -apple-system, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); font-family:var(--font); color:var(--text);
           height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── Header ── */
    #gallery-header {
      background:rgba(10,10,18,0.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; position:sticky; top:0; z-index:10;
    }
    .gh-title { font-size:18px; font-weight:700; }
    .gh-sub { font-size:12px; color:var(--muted); }

    /* ── Albums / Grid ── */
    #gallery-body { flex:1; overflow-y:auto; padding-bottom:65px; }

    .album-section { margin-bottom:4px; }
    .album-header {
      padding:14px 16px 8px;
      font-size:13px; font-weight:600; color:var(--muted);
      letter-spacing:1px; text-transform:uppercase;
    }
    .photo-grid {
      display:grid; grid-template-columns:repeat(3, 1fr); gap:2px;
    }
    .photo-cell {
      aspect-ratio:1; overflow:hidden; position:relative;
      background:var(--bg2); cursor:pointer;
      transition:opacity 0.15s;
    }
    .photo-cell:hover { opacity:0.85; }
    .photo-cell img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-cell .ph-label {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      font-size:10px; color:rgba(255,255,255,0.7); padding:6px 6px 4px;
    }
    .photo-placeholder {
      width:100%; height:100%; display:flex;
      align-items:center; justify-content:center;
      font-size:32px; color:#222;
      flex-direction:column; gap:6px;
    }
    .photo-placeholder span { font-size:10px; color:#333; }

    /* Kitchen photo special */
    .photo-cell.kitchen-cell {
      border:2px solid rgba(180,50,50,0.3);
    }
    .photo-cell.kitchen-cell::after {
      content:'NEW'; position:absolute; top:6px; right:6px;
      background:rgba(220,50,50,0.9);
      color:white; font-size:9px; font-weight:700;
      padding:2px 5px; border-radius:3px;
    }

    /* ── Lightbox ── */
    #lightbox {
      position:fixed; inset:0; z-index:100;
      background:#000;
      display:none; flex-direction:column;
      animation:lbIn 0.25s ease;
    }
    #lightbox.open { display:flex; }
    @keyframes lbIn { from { opacity:0; } to { opacity:1; } }

    #lb-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px;
      background:rgba(0,0,0,0.8); flex-shrink:0;
    }
    #lb-close {
      font-size:22px; cursor:pointer; color:rgba(255,255,255,0.7);
      padding:4px 10px; border-radius:6px; background:none; border:none;
      transition:color 0.15s;
    }
    #lb-close:hover { color:white; }
    #lb-filename { font-size:13px; color:rgba(255,255,255,0.6); }
    #lb-date { font-size:12px; color:rgba(255,255,255,0.4); }

    #lb-image-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    #lb-img { max-width:100%; max-height:100%; object-fit:contain; display:block; }

    /* 送信ボタンは廃止 → LIME(chat.html)から送信する設計に変更 */
  </style>
</head>
<body>

<div id="gallery-header" style="display:flex; align-items:center; gap:12px;">
  <span onclick="goBackHome()" style="font-size:20px; cursor:pointer; color:rgba(255,255,255,0.6); padding:4px;">←</span>
  <div>
    <div class="gh-title">写真</div>
    <div class="gh-sub" id="photo-count">読み込み中...</div>
  </div>
</div>

<div id="gallery-body">
  <div class="album-section">
    <div class="album-header">最近の項目</div>
    <div class="photo-grid" id="photo-grid"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-header">
    <button id="lb-close" onclick="closeLightbox()" aria-label="閉じる">✕</button>
    <div>
      <div id="lb-filename">---</div>
      <div id="lb-date">---</div>
    </div>
  </div>
  <div id="lb-image-wrap">
    <img id="lb-img" src="" alt="写真">
  </div>
</div>

<script>
  if (window.self === window.top) { window.location.href = '../index.html'; }

  function post(type, data) { window.parent.postMessage(Object.assign({ type }, data), '*'); }

  const PHOTOS = [
    { id:'kitchen', file:'../assets/images/kitchen.png', label:'IMG_0847', date:'2024年11月12日', special:true },
    { id:'case',    file:'../assets/images/case.png',    label:'IMG_0830', date:'2024年11月12日', caseSpecial:true },
    { id:'store',   file:'../assets/images/store.png',   label:'IMG_0831', date:'2024年11月12日' },
    { id:'ramen1',  file:'../assets/images/ramen.png',   label:'IMG_0820', date:'2024年11月1日'  },
    { id:'selfie1', file:'../assets/images/selfie.png',  label:'IMG_0790', date:'2024年10月18日' },
    { id:'ramen2',  file:null, label:'IMG_0804', date:'2024年10月25日', emoji:'🍱' },
    { id:'map',     file:null, label:'IMG_0765', date:'2024年10月3日',  emoji:'🗺️' },
  ];

  let currentPhotoId = null;

  function buildGrid() {
    const grid = document.getElementById('photo-grid');
    const count = document.getElementById('photo-count');
    count.textContent = PHOTOS.length + '枚の写真';
    PHOTOS.forEach(p => {
      const cell = document.createElement('div');
      cell.className = 'photo-cell' + (p.special || p.caseSpecial ? ' kitchen-cell' : '');
      cell.onclick = () => openPhoto(p.id);
      if (p.file) {
        const img = document.createElement('img');
        img.src = p.file; img.alt = p.label;
        img.onerror = () => {
          cell.innerHTML = `<div class="photo-placeholder"><span style="font-size:28px">📷</span><span>${p.label}</span></div>`;
        };
        cell.appendChild(img);
        if (p.special || p.caseSpecial) {
          const lbl = document.createElement('div');
          lbl.className = 'ph-label'; lbl.textContent = p.label;
          cell.appendChild(lbl);
        }
      } else {
        cell.innerHTML = `<div class="photo-placeholder"><span>${p.emoji||'📷'}</span><span>${p.label}</span></div>`;
      }
      grid.appendChild(cell);
    });
  }

  function openPhoto(id) {
    const p = PHOTOS.find(x => x.id === id);
    if (!p) return;
    currentPhotoId = id;
    document.getElementById('lb-filename').textContent = p.label;
    document.getElementById('lb-date').textContent = p.date;
    const img = document.getElementById('lb-img');
    const sendBtn = document.getElementById('send-btn');
    if (p.file) {
      img.src = p.file;
      img.style.display = 'block';
    } else {
      img.src = '';
      img.style.display = 'none';
    }
    document.getElementById('lightbox').classList.add('open');
    if (p.special) {
      post('SET_FLAG', { key: 'kitchenPhotoViewed', value: true });
    }
    if (p.caseSpecial) {
      post('SET_FLAG', { key: 'casePhotoViewed', value: true });
    }
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    currentPhotoId = null;
  }

  function goBackHome() {
    post('CLOSE_APP', { appId: 'gallery' });
  }

  buildGrid();
</script>
</body>
</html>
